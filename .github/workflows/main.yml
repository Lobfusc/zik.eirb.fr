name: Build and push docker image

on: 
  push:
    branches : [ main ]
    tags: [ 'v*.*.*' ]

jobs:
  build-and-push-back:
    uses: Eirbware/.github/.github/workflows/build-and-publish.yml@master
    permissions:
      contents: read
      id-token: write
    with:
      context: ./backend/
      file: ./backend/Dockerfile.prod
      image_name: ${{ github.repository }}-backend
    # registry_username and registry_api_key must be defined
    secrets:
      registry_username: ${{ secrets.registry_username }}
      registry_api_key: ${{ secrets.registry_api_key }}
      
  build-and-push-front:
    uses: Eirbware/.github/.github/workflows/build-and-publish.yml@master
    permissions:
      contents: read
      id-token: write
    with:
      context: .
      file: ./nginx/Dockerfile.prod
      image_name: ${{ github.repository }}-frontend
    # registry_username and registry_api_key must be defined
    secrets:
      registry_username: ${{ secrets.registry_username }}
      registry_api_key: ${{ secrets.registry_api_key }}

  build-and-push-db:
    uses: Eirbware/.github/.github/workflows/build-and-publish.yml@master
    permissions:
      contents: read
      id-token: write
    with:
      context: ./initdb
      file: ./initdb/Dockerfile.prod
      image_name: ${{ github.repository }}-db
    # registry_username and registry_api_key must be defined
    secrets:
      registry_username: ${{ secrets.registry_username }}
      registry_api_key: ${{ secrets.registry_api_key }}
      
  deploy:
    needs: [ build-and-push-front, build-and-push-back, build-and-push-db ]
    uses: Eirbware/.github/.github/workflows/deploy-stack.yml@master
    # portainer_stack_webhook must be defined
    secrets: 
        portainer_stack_webhook: ${{ secrets.portainer_stack_webhook }}
        wireguard_conf: ${{ secrets.wireguard_conf }}

