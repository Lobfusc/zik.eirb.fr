     <div class="text-center">

          ✕
        </button>

        &nbsp;

        <form class="space-y-3">

          <div>

            <input type="text" id="manageUserLoginCas" class=" text-base w-full font-medium border rounded-lg px-2 py-2 focus:ring-2 focus:ring-blue-500 outline-none"><br/><br/>
            <button type="button" id="searchUserButton" class="text-xl w-full text-black font-bold py-2 rounded-lg transition bg-[#EDA611] hover:bg-[#F4C566] hover:cursor-pointer">Rechercher</button>
          </div>
          <br/>
          <label for="isUserAdmin" value="isUserAdmin" class="text-lg font-medium mb-1 w-[50%]">Utilisateur ADMIN ?&ensp;</label>
          <input type="checkbox" id="isUserAdmin" class="px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none"><br/>
          <label for="isUserMember" value="isUserMember" class="text-lg font-medium mb-1 w-[50%]">Utilisateur Cotisant ?&ensp;</label>
          <input type="checkbox" id="isUserMember" class="px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none"><br/><br/>
          <button type="button" id="validateManageUsers" class="w-full text-black font-bold py-2 rounded-lg transition bg-[#EDA611] hover:bg-[#F4C566] hover:cursor-pointer text-xl">Valider</button>
