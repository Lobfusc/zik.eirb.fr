services:
  backend:
    env_file:
      - ./process.env
    image: registry.eirb.fr/lobfusc/zik.eirb.fr-backend:main
    container_name: backend
    working_dir: /app
    networks:
      - node-network
    volumes: 
      - ./backend/:/app
      - /app/node_modules
    tty: true
    depends_on:
      - db
      - redis

  db:
    env_file:
      - ./process.env
    image: postgres
    container_name: db
    restart: always
    tty: true
    volumes:
      - ./initdb/:/docker-entrypoint-initdb.d
      - ./data:/var/lib/postgresql
    networks:
      - node-network

  nginx:
    image: registry.eirb.fr/lobfusc/zik.eirb.fr-frontend:main
    container_name: nginx
    restart: always
    tty: true
    ports:
      - "8080:80"
    networks: 
      - node-network
    depends_on:
      - backend
  
  redis:
    image: redis:8.6.1-alpine
    volumes:
      - ./redis-data:/data
    networks:
      - node-network

networks:
  node-network:
    driver: bridge
