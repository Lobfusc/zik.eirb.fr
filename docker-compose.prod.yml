services:
  backend:
    env_file:
      - ./stack.env
    image: registry.eirb.fr/lobfusc/zik.eirb.fr-backend:main
    container_name: backend
    working_dir: /app
    networks:
      - node-network
    tty: true
    depends_on:
      - db
      - redis

  db:
    env_file:
      - ./stack.env
    image: registry.eirb.fr/lobfusc/zik.eirb.fr-db:main
    container_name: db
    restart: always
    tty: true
    volumes:
      - postgres-volume:/var/lib/postgresql
    networks:
      - node-network

  nginx:
    env_file:
      - ./stack.env
    image: registry.eirb.fr/lobfusc/zik.eirb.fr-frontend:main
    container_name: nginx
    restart: always
    tty: true
    ports:
      - ${WEB_PORT:-8080}:80
    networks: 
      - node-network
    depends_on:
      - backend
  
  redis:
    image: redis:8.6.1-alpine
    container_name: redis
    volumes:
      - redis-volume:/data
    networks:
      - node-network
volumes:
  redis-volume:
  postgres-volume:
networks:
  node-network:
    driver: bridge
